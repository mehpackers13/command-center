<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Command Center</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --green:   #3fb950;
    --red:     #f85149;
    --yellow:  #d29922;
    --blue:    #58a6ff;
    --purple:  #bc8cff;
    --orange:  #ffa657;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header h1 span { color: var(--blue); }
  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .refresh-info { color: var(--muted); font-size: 12px; }
  .live-badge {
    background: rgba(63,185,80,.15);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }
  .live-badge::before { content: '● '; }

  /* ── Layout ── */
  .page { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px; }
  .grid-1 { margin-bottom: 20px; }
  @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } }
  @media (max-width: 600px) { .page { padding: 12px; } }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }
  .card-body { padding: 16px 18px; }

  /* ── Bot status cards ── */
  .bot-card { position: relative; }
  .bot-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .bot-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .bot-status.ok    { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid var(--green); }
  .bot-status.warn  { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid var(--yellow); }
  .bot-status.error { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid var(--red); }
  .bot-status.loading { background: rgba(88,166,255,.1); color: var(--blue);  border: 1px solid var(--blue); }
  .bot-status::before { content: '●'; font-size: 8px; }
  .bot-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .bot-meta-item { }
  .bot-meta-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .bot-meta-value { font-size: 15px; font-weight: 700; }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .pnl-zero { color: var(--muted); }

  /* ── P&L summary ── */
  .pnl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .pnl-row:last-child { border-bottom: none; }
  .pnl-label { color: var(--muted); font-size: 13px; }
  .pnl-amount { font-size: 18px; font-weight: 700; }
  .pnl-total { font-size: 22px; }

  /* ── Bankroll bar ── */
  .bankroll-item { margin-bottom: 14px; }
  .bankroll-item:last-child { margin-bottom: 0; }
  .bankroll-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .bankroll-bar-track {
    background: var(--bg);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .bankroll-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .bar-blue   { background: var(--blue); }
  .bar-purple { background: var(--purple); }
  .bar-green  { background: var(--green); }
  .bar-orange { background: var(--orange); }

  /* ── Alerts feed ── */
  .alert-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-source {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
    align-self: center;
  }
  .src-fanduel { background: rgba(88,166,255,.2); color: var(--blue); border: 1px solid rgba(88,166,255,.4); }
  .src-kalshi  { background: rgba(188,140,255,.2); color: var(--purple); border: 1px solid rgba(188,140,255,.4); }
  .src-options { background: rgba(255,166,87,.2); color: var(--orange); border: 1px solid rgba(255,166,87,.4); }
  .alert-text { line-height: 1.4; }
  .alert-title { font-weight: 600; margin-bottom: 2px; }
  .alert-sub { font-size: 12px; color: var(--muted); }
  .alert-edge {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    align-self: center;
  }

  /* ── Auto-bet log ── */
  .bet-row {
    display: grid;
    grid-template-columns: 90px 1fr 60px 70px 70px 80px;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 13px;
  }
  .bet-row:last-child { border-bottom: none; }
  .bet-row-header { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; }
  @media (max-width: 700px) {
    .bet-row { grid-template-columns: 1fr 1fr; gap: 6px; }
    .bet-row-header { display: none; }
  }
  .dir-yes { color: var(--green); font-weight: 700; }
  .dir-no  { color: var(--red);   font-weight: 700; }
  .dry-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(88,166,255,.15);
    color: var(--blue);
    border: 1px solid rgba(88,166,255,.3);
  }
  .live-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(63,185,80,.15);
    color: var(--green);
    border: 1px solid var(--green);
  }

  /* ── Hit rate table ── */
  .stat-table { width: 100%; border-collapse: collapse; }
  .stat-table th, .stat-table td {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .stat-table th { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .stat-table tr:last-child td { border-bottom: none; }
  .rate-bar {
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
    min-width: 60px;
  }
  .rate-fill { height: 100%; border-radius: 3px; background: var(--blue); }

  /* ── Loading skeleton ── */
  .skeleton { background: var(--border); border-radius: 4px; animation: shimmer 1.5s infinite; }
  @keyframes shimmer {
    0%   { opacity: .4; }
    50%  { opacity: .8; }
    100% { opacity: .4; }
  }

  /* ── Misc ── */
  .empty-state { color: var(--muted); text-align: center; padding: 24px; font-size: 13px; }
  .section-divider {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 1px;
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Bot <span>Command Center</span></h1>
  <div class="header-right">
    <div class="live-badge">LIVE</div>
    <div class="refresh-info" id="refresh-info">Loading…</div>
  </div>
</div>

<div class="page">

  <!-- ── Bot Status Row ── -->
  <div class="section-divider">Bot Status</div>
  <div class="grid-3" id="bot-status-row">
    <div class="card bot-card"><div class="card-body">
      <div class="skeleton" style="height:16px;width:100px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:24px;width:80px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div></div>
    <div class="card bot-card"><div class="card-body">
      <div class="skeleton" style="height:16px;width:100px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:24px;width:80px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div></div>
    <div class="card bot-card"><div class="card-body">
      <div class="skeleton" style="height:16px;width:100px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:24px;width:80px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:40px"></div>
    </div></div>
  </div>

  <!-- ── P&L + Bankroll ── -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Total P&amp;L</div>
      </div>
      <div class="card-body" id="pnl-panel">
        <div class="skeleton" style="height:80px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Bankroll Tracker</div>
      </div>
      <div class="card-body" id="bankroll-panel">
        <div class="skeleton" style="height:80px"></div>
      </div>
    </div>
  </div>

  <!-- ── Today's Alerts Feed ── -->
  <div class="section-divider">Today's Alerts Feed</div>
  <div class="card grid-1">
    <div class="card-header">
      <div class="card-title">All Bots — Unified Alert Stream</div>
      <div id="alert-count" style="font-size:12px;color:var(--muted)"></div>
    </div>
    <div class="card-body" id="alerts-feed">
      <div class="skeleton" style="height:120px"></div>
    </div>
  </div>

  <!-- ── Weekly Hit Rates + Auto-bet Log ── -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Weekly Hit Rates</div>
      </div>
      <div class="card-body" id="hit-rates-panel">
        <div class="skeleton" style="height:120px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Kalshi Auto-Bet Log</div>
        <div id="dry-run-badge"></div>
      </div>
      <div class="card-body" id="autobet-log">
        <div class="skeleton" style="height:120px"></div>
      </div>
    </div>
  </div>

</div>

<script>
const BOTS = {
  fanduel: {
    name: 'FanDuel Bot',
    color: 'var(--blue)',
    url: 'https://raw.githubusercontent.com/mehpackers13/fanduel-bot/main/docs/data.json',
    srcClass: 'src-fanduel',
  },
  kalshi: {
    name: 'Kalshi Bot',
    color: 'var(--purple)',
    url: 'https://raw.githubusercontent.com/mehpackers13/kalshi-bot/main/docs/data.json',
    srcClass: 'src-kalshi',
  },
  options: {
    name: 'Options Bot',
    color: 'var(--orange)',
    url: 'https://raw.githubusercontent.com/mehpackers13/options-bot/main/docs/data.json',
    srcClass: 'src-options',
  },
};

let data = { fanduel: null, kalshi: null, options: null };
let lastRefresh = null;

// ── Fetch helpers ──────────────────────────────────────────────────────────
async function fetchBot(key) {
  try {
    const url = BOTS[key].url + '?_=' + Date.now();
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    console.warn(key + ' fetch failed:', e);
    return null;
  }
}

async function refreshAll() {
  const results = await Promise.all([
    fetchBot('fanduel'),
    fetchBot('kalshi'),
    fetchBot('options'),
  ]);
  data.fanduel = results[0];
  data.kalshi  = results[1];
  data.options = results[2];
  lastRefresh  = new Date();
  render();
  scheduleNext();
}

function scheduleNext() {
  const el = document.getElementById('refresh-info');
  let secs = 300;
  const tick = () => {
    const m = Math.floor(secs / 60), s = secs % 60;
    el.textContent = `Last: ${lastRefresh.toLocaleTimeString()} — refresh in ${m}:${s.toString().padStart(2,'0')}`;
    if (secs-- > 0) setTimeout(tick, 1000);
    else refreshAll();
  };
  tick();
}

// ── Utilities ──────────────────────────────────────────────────────────────
function pnlClass(v) {
  if (v > 0) return 'pnl-pos';
  if (v < 0) return 'pnl-neg';
  return 'pnl-zero';
}
function pnlStr(v) {
  if (v === null || v === undefined) return '—';
  const s = v >= 0 ? '+' : '';
  return s + '$' + Math.abs(v).toFixed(2);
}
function ago(isoStr) {
  if (!isoStr) return '—';
  const diff = (Date.now() - new Date(isoStr)) / 1000;
  if (diff < 120) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function statusFromAge(isoStr, maxMinutes) {
  if (!isoStr) return 'error';
  const diff = (Date.now() - new Date(isoStr)) / 60000;
  if (diff > maxMinutes * 2) return 'error';
  if (diff > maxMinutes * 1.5) return 'warn';
  return 'ok';
}
function isToday(tsStr) {
  if (!tsStr) return false;
  const d = new Date(tsStr.replace(' ET','Z').replace(' ','T'));
  const today = new Date();
  return d.getUTCFullYear() === today.getUTCFullYear() &&
         d.getUTCMonth()    === today.getUTCMonth() &&
         d.getUTCDate()     === today.getUTCDate();
}

// ── Render bot status cards ────────────────────────────────────────────────
function renderBotCards() {
  const row = document.getElementById('bot-status-row');

  const cards = [
    buildFanDuelCard(),
    buildKalshiCard(),
    buildOptionsCard(),
  ];
  row.innerHTML = cards.join('');
}

function buildFanDuelCard() {
  const d = data.fanduel;
  if (!d) return botLoadError('FanDuel Bot');
  const status = statusFromAge(d.generated_at, 120);
  const stats  = d.stats || {};
  const pnl    = stats.total_pl || 0;
  return `
  <div class="card bot-card">
    <div class="card-body">
      <div class="bot-name">⚾ FanDuel Bot</div>
      <div class="bot-status ${status}">${status === 'ok' ? 'Running' : status === 'warn' ? 'Delayed' : 'Offline'}</div>
      <div class="bot-meta">
        <div class="bot-meta-item">
          <div class="bot-meta-label">Last Scan</div>
          <div class="bot-meta-value" style="font-size:13px">${d.last_scan ? d.last_scan.replace(' ET','') : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Total Alerts</div>
          <div class="bot-meta-value">${stats.total_alerts ?? '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Win Rate</div>
          <div class="bot-meta-value">${stats.win_rate != null ? stats.win_rate + '%' : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">P&amp;L</div>
          <div class="bot-meta-value ${pnlClass(pnl)}">${pnlStr(pnl)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildKalshiCard() {
  const d = data.kalshi;
  if (!d) return botLoadError('Kalshi Bot');
  const status = statusFromAge(d.generated_at, 60);
  const stats  = d.stats || {};
  const br     = d.bankroll || {};
  const live   = br.live || {};
  const pnl    = d.live_pnl || 0;
  const dryRun = d.dry_run !== false;
  return `
  <div class="card bot-card">
    <div class="card-body">
      <div class="bot-name">📊 Kalshi Bot</div>
      <div class="bot-status ${status}">${status === 'ok' ? 'Running' : status === 'warn' ? 'Delayed' : 'Offline'}</div>
      <div class="bot-meta">
        <div class="bot-meta-item">
          <div class="bot-meta-label">Live Balance</div>
          <div class="bot-meta-value">${live.balance != null ? '$'+live.balance.toFixed(2) : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Total Alerts</div>
          <div class="bot-meta-value">${stats.total_alerts ?? '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Hit Rate</div>
          <div class="bot-meta-value">${stats.hit_rate != null ? stats.hit_rate + '%' : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Live P&amp;L</div>
          <div class="bot-meta-value ${pnlClass(pnl)}">${pnlStr(pnl)}</div>
        </div>
      </div>
      ${dryRun ? '<div style="margin-top:10px"><span class="tag" style="background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.3)">🔵 DRY RUN MODE</span></div>' : '<div style="margin-top:10px"><span class="tag" style="background:rgba(63,185,80,.1);color:var(--green);border:1px solid var(--green)">✅ LIVE BETTING</span></div>'}
    </div>
  </div>`;
}

function buildOptionsCard() {
  const d = data.options;
  if (!d) return botLoadError('Options Bot');
  const status = statusFromAge(d.generated_at, 120);
  const stats  = d.stats || {};
  return `
  <div class="card bot-card">
    <div class="card-body">
      <div class="bot-name">📈 Options Bot</div>
      <div class="bot-status ${status}">${status === 'ok' ? 'Running' : status === 'warn' ? 'Delayed' : 'Offline'}</div>
      <div class="bot-meta">
        <div class="bot-meta-item">
          <div class="bot-meta-label">Last Scan</div>
          <div class="bot-meta-value" style="font-size:13px">${d.last_scan ? d.last_scan.replace(' ET','') : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Total Alerts</div>
          <div class="bot-meta-value">${stats.total_alerts ?? '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Hit Rate</div>
          <div class="bot-meta-value">${stats.overall_hit_rate != null ? stats.overall_hit_rate + '%' : '—'}</div>
        </div>
        <div class="bot-meta-item">
          <div class="bot-meta-label">Rated Bets</div>
          <div class="bot-meta-value">${stats.rated_count ?? '—'}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function botLoadError(name) {
  return `<div class="card bot-card"><div class="card-body">
    <div class="bot-name">${name}</div>
    <div class="bot-status error">Offline</div>
    <div style="color:var(--muted);font-size:12px">Could not load data</div>
  </div></div>`;
}

// ── Render P&L panel ───────────────────────────────────────────────────────
function renderPnL() {
  const fd  = data.fanduel?.stats?.total_pl ?? null;
  const kb  = data.kalshi?.live_pnl ?? null;
  const op  = null; // options-bot doesn't track dollar P&L yet
  const total = [fd, kb, op].filter(x => x !== null).reduce((a,b) => a+b, 0);

  const rows = [
    { label: '⚾ FanDuel',  val: fd },
    { label: '📊 Kalshi',   val: kb },
    { label: '📈 Options',  val: op },
  ];

  document.getElementById('pnl-panel').innerHTML = `
    ${rows.map(r => `
      <div class="pnl-row">
        <div class="pnl-label">${r.label}</div>
        <div class="pnl-amount ${pnlClass(r.val)}">${pnlStr(r.val)}</div>
      </div>`).join('')}
    <div class="pnl-row" style="margin-top:4px">
      <div class="pnl-label" style="color:var(--text);font-weight:700">TOTAL</div>
      <div class="pnl-amount pnl-total ${pnlClass(total)}">${pnlStr(total)}</div>
    </div>
  `;
}

// ── Render bankroll panel ──────────────────────────────────────────────────
function renderBankroll() {
  const items = [];

  const kb = data.kalshi?.bankroll;
  if (kb?.live) {
    const bal  = kb.live.balance  || 0;
    const peak = kb.live.peak     || bal || 1;
    items.push({ label: 'Kalshi Live', val: bal, peak, bar: 'bar-purple', prefix: '$' });
  }
  if (kb?.paper) {
    const bal  = kb.paper.balance || 0;
    const peak = kb.paper.peak    || 1000;
    items.push({ label: 'Kalshi Paper', val: bal, peak, bar: 'bar-blue', prefix: '$' });
  }

  const fd = data.fanduel;
  if (fd) {
    items.push({ label: 'FanDuel Bankroll', val: 1000, peak: 1000, bar: 'bar-green', prefix: '$' });
  }

  if (!items.length) {
    document.getElementById('bankroll-panel').innerHTML = '<div class="empty-state">No bankroll data</div>';
    return;
  }

  document.getElementById('bankroll-panel').innerHTML = items.map(item => {
    const pct = Math.min(100, Math.max(2, item.peak > 0 ? (item.val / item.peak) * 100 : 100));
    return `
    <div class="bankroll-item">
      <div class="bankroll-header">
        <span style="font-weight:600">${item.label}</span>
        <span>${item.prefix}${item.val.toFixed(2)} / peak ${item.prefix}${item.peak.toFixed(2)}</span>
      </div>
      <div class="bankroll-bar-track">
        <div class="bankroll-bar-fill ${item.bar}" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
}

// ── Render unified alerts feed ─────────────────────────────────────────────
function renderAlerts() {
  const allAlerts = [];

  // FanDuel: recent_bets
  (data.fanduel?.recent_bets || []).slice(0, 20).forEach(b => {
    allAlerts.push({
      ts:     b.timestamp,
      source: 'fanduel',
      title:  `${b.sport} — ${b.game}`,
      sub:    `${b.bet_type} ${b.bet_side} ${b.line} | ${b.signals}`,
      edge:   b.edge_pct ? '+' + b.edge_pct + '%' : null,
    });
  });

  // Kalshi: recent_alerts
  (data.kalshi?.recent_alerts || []).slice(0, 20).forEach(a => {
    const edge = parseFloat(a.edge_pct);
    allAlerts.push({
      ts:     a.timestamp,
      source: 'kalshi',
      title:  a.title || a.ticker,
      sub:    `${a.direction || ''} | conf ${a.confidence || ''}`,
      edge:   !isNaN(edge) ? (edge >= 0 ? '+' : '') + edge.toFixed(1) + '%' : null,
    });
  });

  // Options: alerts
  (data.options?.alerts || []).slice(0, 20).forEach(a => {
    allAlerts.push({
      ts:     a.timestamp,
      source: 'options',
      title:  a.ticker + ' — ' + (a.signal_type || ''),
      sub:    a.reasoning || '',
      edge:   a.edge_pct ? (a.edge_pct >= 0 ? '+' : '') + parseFloat(a.edge_pct).toFixed(1) + '%' : null,
    });
  });

  // Sort by timestamp desc
  allAlerts.sort((a, b) => new Date(b.ts) - new Date(a.ts));

  document.getElementById('alert-count').textContent = allAlerts.length + ' total';

  if (!allAlerts.length) {
    document.getElementById('alerts-feed').innerHTML = '<div class="empty-state">No alerts yet — bots are scanning quietly</div>';
    return;
  }

  document.getElementById('alerts-feed').innerHTML = allAlerts.slice(0, 30).map(a => {
    const edgeColor = a.edge && parseFloat(a.edge) > 0 ? 'var(--green)' : 'var(--red)';
    return `
    <div class="alert-item">
      <div class="alert-source ${BOTS[a.source].srcClass}">${a.source}</div>
      <div class="alert-text">
        <div class="alert-title">${escHtml(a.title)}</div>
        <div class="alert-sub">${escHtml(a.sub)} &nbsp;·&nbsp; ${ago(a.ts)}</div>
      </div>
      ${a.edge ? `<div class="alert-edge" style="color:${edgeColor}">${escHtml(a.edge)}</div>` : '<div></div>'}
    </div>`;
  }).join('');
}

// ── Render hit rates ───────────────────────────────────────────────────────
function renderHitRates() {
  const rows = [];

  // Kalshi by category
  const kbCats = data.kalshi?.stats?.by_category || {};
  Object.entries(kbCats).forEach(([cat, v]) => {
    if (!v.rated) return;
    rows.push({ bot: 'Kalshi', name: cat, total: v.total, rated: v.rated, rate: v.hit_rate });
  });

  // Kalshi by edge bucket
  const kbBuckets = data.kalshi?.stats?.by_edge_bucket || {};
  Object.entries(kbBuckets).forEach(([bucket, v]) => {
    if (!v.rated) return;
    rows.push({ bot: 'Kalshi', name: bucket, total: v.total, rated: v.rated, rate: v.hit_rate });
  });

  // FanDuel by sport
  const fdSports = data.fanduel?.stats?.by_sport || {};
  Object.entries(fdSports).forEach(([sport, v]) => {
    if (typeof v === 'object' && v.rated) {
      rows.push({ bot: 'FanDuel', name: sport, total: v.total, rated: v.rated, rate: v.hit_rate });
    }
  });

  if (!rows.length) {
    document.getElementById('hit-rates-panel').innerHTML = '<div class="empty-state">No rated bets yet — hit rates update as markets resolve</div>';
    return;
  }

  document.getElementById('hit-rates-panel').innerHTML = `
  <table class="stat-table">
    <tr><th>Bot</th><th>Category</th><th>Bets</th><th>Hit Rate</th><th></th></tr>
    ${rows.map(r => {
      const rate = r.rate ?? 0;
      return `<tr>
        <td><span style="color:var(--muted);font-size:11px">${r.bot}</span></td>
        <td>${escHtml(r.name)}</td>
        <td>${r.rated}/${r.total}</td>
        <td>${r.rate != null ? r.rate + '%' : '—'}</td>
        <td><div class="rate-bar"><div class="rate-fill" style="width:${rate}%"></div></div></td>
      </tr>`;
    }).join('')}
  </table>`;
}

// ── Render auto-bet log ────────────────────────────────────────────────────
function renderAutoBetLog() {
  const bets = data.kalshi?.bets_placed || [];
  const dryRun = data.kalshi?.dry_run !== false;

  document.getElementById('dry-run-badge').innerHTML = dryRun
    ? '<span class="dry-tag">DRY RUN</span>'
    : '<span class="live-tag">LIVE</span>';

  if (!bets.length) {
    document.getElementById('autobet-log').innerHTML = '<div class="empty-state">No auto-bets placed yet</div>';
    return;
  }

  document.getElementById('autobet-log').innerHTML = `
  <div class="bet-row bet-row-header">
    <span>Time</span><span>Market</span><span>Dir</span><span>Size</span><span>Edge</span><span>Status</span>
  </div>
  ${bets.slice(0, 15).map(b => {
    const isDryRun = b.dry_run === 'True' || b.dry_run === true;
    const dir = (b.direction || '').toUpperCase();
    const edge = parseFloat(b.edge_pct);
    const dollars = parseFloat(b.dollars_risked);
    const ts = b.timestamp ? new Date(b.timestamp).toLocaleString('en-US', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    return `<div class="bet-row">
      <span style="color:var(--muted);font-size:12px">${ts}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(b.title||'')}">
        <span style="font-size:11px;color:var(--muted)">${escHtml(b.category||'')}</span><br>
        <span style="font-weight:600;font-size:12px">${escHtml(b.ticker||'')}</span>
      </span>
      <span class="${dir==='YES'?'dir-yes':'dir-no'}">${dir}</span>
      <span>${isNaN(dollars)?'—':'$'+dollars.toFixed(2)}<br><span style="color:var(--muted);font-size:11px">${b.contracts||''}ct @ ${b.price_cents||''}¢</span></span>
      <span style="color:${edge>=0?'var(--green)':'var(--red)'};font-weight:700">${isNaN(edge)?'—':(edge>=0?'+':'')+edge.toFixed(1)+'%'}</span>
      <span>${isDryRun ? '<span class="dry-tag">dry run</span>' : '<span class="live-tag">placed</span>'}</span>
    </div>`;
  }).join('')}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Master render ──────────────────────────────────────────────────────────
function render() {
  renderBotCards();
  renderPnL();
  renderBankroll();
  renderAlerts();
  renderHitRates();
  renderAutoBetLog();
}

// ── Boot ──────────────────────────────────────────────────────────────────
refreshAll();
</script>
</body>
</html>
